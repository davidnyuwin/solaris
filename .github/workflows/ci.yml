name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Compile Solaris (Debug)
        run: swift build

      - name: Run API Smoke Test
        run: ./scripts/smoke-test.sh

      - name: Run Security & Secret Scan
        run: ./scripts/secret-scan.sh

  package:
    name: Package & Code Sign
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Scripts Executable
        run: chmod +x scripts/*.sh

      - name: Compile and Package App Bundle
        run: ./scripts/build-app.sh --sign --zip

      - name: Validate App Package Structures
        run: |
          test -d dist/Solaris.app
          test -x dist/Solaris.app/Contents/MacOS/Solaris
          test -f dist/Solaris.app/Contents/Resources/Solaris.icns
          test -f dist/Solaris-v0.3.0-dev.zip
          plutil -lint dist/Solaris.app/Contents/Info.plist
          codesign --verify --deep --strict --verbose=2 dist/Solaris.app

      - name: Upload Release Archive
        uses: actions/upload-artifact@v4
        with:
          name: Solaris-v0.3.0-dev
          path: dist/Solaris-v0.3.0-dev.zip
          if-no-files-found: error
